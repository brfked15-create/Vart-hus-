<!DOCTYPE html>
<!-- v5 -->
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2a1c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vårt Hus">
<link rel="manifest" href="manifest.json">
<title>Vårt Hus – BRF KED15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --safe-top: env(safe-area-inset-top, 0px); }
body { font-family: 'Inter', sans-serif; background: #f2f1ef; display: flex; justify-content: center; min-height: 100vh; min-height: 100dvh; }
.app { width: 100%; max-width: 430px; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
.hero { position: relative; height: calc(200px + var(--safe-top)); flex-shrink: 0; overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.hero img { width: 100%; height: 100%; object-fit: cover; object-position: center 55%; display: block; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(30,18,10,0.80) 0%, rgba(0,0,0,0.1) 55%, transparent 100%); }
.hero-text { position: absolute; bottom: 18px; left: 22px; color: white; }
.hero-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; text-shadow: 0 1px 8px rgba(0,0,0,0.45); }
.hero-sub { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; opacity: 0.75; margin-top: 5px; }
.tabs { background: #2a1c0e; display: flex; flex-shrink: 0; }
.tab { flex: 1; padding: 11px 4px 9px; text-align: center; cursor: pointer; font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.5); border: none; background: none; transition: color 0.2s; -webkit-tap-highlight-color: transparent; }
.tab svg { display: block; margin: 0 auto 4px; width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.tab.active { color: #e8c99a; border-bottom: 2px solid #e8c99a; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px 40px; }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: #8a7f72; margin-bottom: 12px; }
.card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-header { display: flex; align-items: flex-start; gap: 12px; }
.card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-icon svg { width: 20px; height: 20px; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.icon-blue  { background: #e8f1fb; } .icon-blue  svg { stroke: #2563b0; }
.icon-amber { background: #fef3dc; } .icon-amber svg { stroke: #9a6500; }
.icon-green { background: #e8f5e9; } .icon-green svg { stroke: #2d7a3a; }
.icon-red   { background: #fdecea; } .icon-red   svg { stroke: #c0392b; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 500; color: #1a1410; margin-bottom: 2px; }
.card-meta  { font-size: 11px; color: #9a8f82; }
.card-text  { font-size: 13px; color: #5a5048; margin-top: 7px; line-height: 1.55; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; margin-top: 8px; }
.badge-blue  { background: #e8f1fb; color: #2563b0; }
.badge-amber { background: #fef3dc; color: #9a6500; }
.badge-green { background: #e8f5e9; color: #2d7a3a; }
.price { font-size: 15px; font-weight: 600; color: #1a1410; }
.annons-row { display: flex; justify-content: space-between; align-items: center; margin-top: 7px; }
.annons-tag { font-size: 11px; color: #9a8f82; background: #f2f1ef; padding: 2px 8px; border-radius: 99px; }
.dashed { border: 1.5px dashed #d4c8bb; background: #faf9f7; cursor: pointer; width: 100%; text-align: left; box-shadow: none; }
.hidden { display: none; }
.loading { text-align: center; padding: 40px 0; color: #9a8f82; font-size: 13px; }
.spinner { width: 24px; height: 24px; border: 2px solid #e8c99a; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px 16px; color: #9a8f82; font-size: 13px; }

/* Modaler */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: #1a1410; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: #8a7f72; margin-bottom: 5px; }
.field input, .field textarea, .field select { width: 100%; border: 1px solid #e0d8d0; border-radius: 10px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 14px; color: #1a1410; background: #faf9f7; outline: none; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: #a08060; }
.field textarea { height: 80px; resize: none; }
.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn-primary { flex: 1; background: #2a1c0e; color: #e8c99a; border: none; border-radius: 99px; padding: 13px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-secondary { background: none; border: 1.5px solid #d4c8bb; border-radius: 99px; padding: 13px 20px; font-family: 'Inter', sans-serif; font-size: 14px; color: #8a7f72; cursor: pointer; }
.btn-danger { background: #fdecea; color: #c0392b; border: none; border-radius: 99px; padding: 8px 14px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-success { background: #e8f5e9; color: #2d7a3a; border: none; border-radius: 99px; padding: 8px 14px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2a1c0e; color: #e8c99a; padding: 12px 24px; border-radius: 99px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* Admin */
.admin-badge { background: #e8c99a; color: #2a1c0e; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.8px; text-transform: uppercase; margin-left: 8px; vertical-align: middle; }
.admin-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
</style>

</div>

    <div class="field"><label>Beskriv felet</label><textarea id="fel-text" placeholder="Beskriv var och vad som är fel..."></textarea></div>
    <div class="field"><label>Lägenhetsnummer</label><input type="text" id="fel-lgh" placeholder="T.ex. Lgh 12"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('felanmalan-modal')">Avbryt</button>
      <button class="btn-primary" onclick="submitFelanmalan()">Skicka</button>
    </div>
  </div>
</div>

<!-- ANNONS MODAL -->
<div class="modal-bg" id="annons-modal">
  <div class="modal">
    <h3>Lägg upp annons</h3>
    <div class="field"><label>Rubrik</label><input type="text" id="ann-titel" placeholder="T.ex. Fåtölj i bra skick"></div>
    <div class="field"><label>Beskrivning</label><textarea id="ann-text" placeholder="Beskriv vad du säljer eller söker..."></textarea></div>
    <div class="field"><label>Lägenhetsnummer</label><input type="text" id="ann-lgh" placeholder="T.ex. Lgh 5"></div>
    <div class="field">
      <label>Typ</label>
      <select id="ann-typ"><option value="saljes">Säljes</option><option value="sokes">Sökes</option></select>
    </div>
    <div class="field"><label>Pris (kr, lämna tomt om sökes)</label><input type="number" id="ann-pris" placeholder="T.ex. 500"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('annons-modal')">Avbryt</button>
      <button class="btn-primary" onclick="submitAnnons()">Publicera</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://coxyujxdbqwyzhurhvrq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNveHl1anhkYnF3eXpodXJodnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTQwMDIsImV4cCI6MjA5NTEzMDAwMn0.22D9_HAJY-ShbqH8mJIL7rTZ8pzB_Z2dKpVEU9hu3s0";
const ADMIN_PASSWORD = "ked15styrelse";

let isAdmin = false;

async function db(table, method = 'GET', body = null, query = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  if (method === 'GET') return res.json();
  return res.ok;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Just nu';
  if (diff < 3600) return `${Math.floor(diff/60)} min sedan`;
  if (diff < 86400) return `${Math.floor(diff/3600)} tim sedan`;
  const days = Math.floor(diff/86400);
  if (days < 7) return `${days} dag${days>1?'ar':''} sedan`;
  return d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
}

const icons = {
  nyhet:  `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#2563b0;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  fel:    `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#9a6500;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  solved: `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#2d7a3a;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg>`,
  saljes: `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#2563b0;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
  sokes:  `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#9a6500;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`
};

// Admin-inloggning: 5 snabba tryck på headern
let tapCount = 0, tapTimer;
document.getElementById('hero-tap').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  if (tapCount >= 5) {
    tapCount = 0;
    openModal('login-modal');
  } else {
    tapTimer = setTimeout(() => tapCount = 0, 2000);
  }
});

function tryLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    closeModal('login-modal');
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-badge').classList.remove('hidden');
    document.getElementById('ny-nyhet-btn').classList.remove('hidden');
    showToast('Välkommen, styrelsen!');
    loadNyheter(); loadFelanmalan(); loadAnnonser();
  } else {
    showToast('Fel lösenord');
  }
}

async function loadNyheter() {
  const data = await db('nyheter', 'GET', null, '?order=skapad_at.desc');
  const el = document.getElementById('nyheter-list');
  if (!data.length) { el.innerHTML = '<div class="empty">Inga nyheter än.</div>'; return; }
  el.innerHTML = data.map(n => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-blue">${icons.nyhet}</div>
        <div class="card-body">
          <div class="card-title">${n.titel}</div>
          <div class="card-meta">${n.skapad_av} · ${timeAgo(n.skapad_at)}</div>
          <div class="card-text">${n.text}</div>
          ${isAdmin ? `<div class="admin-actions">
            <button class="btn-danger" onclick="deleteItem('nyheter','${n.id}', loadNyheter)">Ta bort</button>
          </div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

async function loadFelanmalan() {
  const data = await db('felanmalan', 'GET', null, '?order=skapad_at.desc');
  const el = document.getElementById('felanmalan-list');
  if (!data.length) { el.innerHTML = '<div class="empty">Inga ärenden än.</div>'; return; }
  el.innerHTML = data.map(f => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon ${f.status === 'solved' ? 'icon-green' : 'icon-amber'}">${f.status === 'solved' ? icons.solved : icons.fel}</div>
        <div class="card-body">
          <div class="card-title">${f.titel}</div>
          <div class="card-meta">${f.lagenhet} · ${timeAgo(f.skapad_at)}</div>
          <div class="card-text">${f.text}</div>
          <span class="badge ${f.status === 'solved' ? 'badge-green' : 'badge-amber'}">${f.status === 'solved' ? 'Åtgärdad' : 'Under utredning'}</span>
          ${isAdmin ? `<div class="admin-actions">
            ${f.status !== 'solved' ? `<button class="btn-success" onclick="markSolved('${f.id}')">Markera åtgärdad</button>` : ''}
            <button class="btn-danger" onclick="deleteItem('felanmalan','${f.id}', loadFelanmalan)">Ta bort</button>
          </div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

async function loadAnnonser() {
  const data = await db('annonser', 'GET', null, '?order=skapad_at.desc');
  const el = document.getElementById('annonser-list');
  if (!data.length) { el.innerHTML = '<div class="empty">Inga annonser än.</div>'; return; }
  el.innerHTML = data.map(a => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon ${a.typ === 'saljes' ? 'icon-blue' : 'icon-amber'}">${a.typ === 'saljes' ? icons.saljes : icons.sokes}</div>
        <div class="card-body">
          <div class="card-title">${a.titel}</div>
          <div class="card-meta">${a.lagenhet} · ${timeAgo(a.skapad_at)}</div>
          <div class="card-text">${a.text}</div>
          <div class="annons-row">
            <span class="annons-tag">${a.typ === 'saljes' ? 'Säljes' : 'Sökes'}</span>
            ${a.pris ? `<span class="price">${a.pris} kr</span>` : ''}
          </div>
          ${isAdmin ? `<div class="admin-actions">
            <button class="btn-danger" onclick="deleteItem('annonser','${a.id}', loadAnnonser)">Ta bort</button>
          </div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

async function markSolved(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/felanmalan?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'solved' })
  });
  if (res.ok) { showToast('Markerad som åtgärdad!'); loadFelanmalan(); }
}

async function deleteItem(table, id, reloadFn) {
  if (!confirm('Är du säker på att du vill ta bort detta?')) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (res.ok) { showToast('Borttagen!'); reloadFn(); }
}

async function submitNyhet() {
  const titel = document.getElementById('nyh-titel').value.trim();
  const text  = document.getElementById('nyh-text').value.trim();
  if (!titel || !text) { showToast('Fyll i alla fält'); return; }
  const ok = await db('nyheter', 'POST', { titel, text, skapad_av: 'Styrelsen' });
  if (ok) {
    closeModal('nyhet-modal');
    ['nyh-titel','nyh-text'].forEach(id => document.getElementById(id).value = '');
    showToast('Nyhet publicerad!');
    loadNyheter();
  }
}

async function submitFelanmalan() {
  const titel = document.getElementById('fel-titel').value.trim();
  const text  = document.getElementById('fel-text').value.trim();
  const lgh   = document.getElementById('fel-lgh').value.trim();
  if (!titel || !text || !lgh) { showToast('Fyll i alla fält'); return; }
  const ok = await db('felanmalan', 'POST', { titel, text, lagenhet: lgh, status: 'open' });
  if (ok) {
    closeModal('felanmalan-modal');
    ['fel-titel','fel-text','fel-lgh'].forEach(id => document.getElementById(id).value = '');
    showToast('Felanmälan skickad!');
    loadFelanmalan();
  }
}

async function submitAnnons() {
  const titel = document.getElementById('ann-titel').value.trim();
  const text  = document.getElementById('ann-text').value.trim();
  const lgh   = document.getElementById('ann-lgh').value.trim();
  const typ   = document.getElementById('ann-typ').value;
  const pris  = document.getElementById('ann-pris').value;
  if (!titel || !text || !lgh) { showToast('Fyll i alla fält'); return; }
  const ok = await db('annonser', 'POST', { titel, text, lagenhet: lgh, typ, pris: pris ? parseInt(pris) : null });
  if (ok) {
    closeModal('annons-modal');
    ['ann-titel','ann-text','ann-lgh','ann-pris'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('ann-typ').value = 'saljes';
    showToast('Annons publicerad!');
    loadAnnonser();
  }
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function show(id, btn) {
  ['anslagstavla','felanmalan','annonser'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.remove('hidden');
  btn.classList.add('active');
}

document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

loadNyheter(); loadFelanmalan(); loadAnnonser();
</script>
</body>
</html>
